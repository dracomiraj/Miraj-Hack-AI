<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miraj Hackz AI</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ffcc;
    font-family: monospace;
    text-align: center;
}

h1 {
    padding: 20px;
    text-shadow: 0 0 10px #00ffcc;
}

input {
    width: 80%;
    padding: 12px;
    margin: 10px;
    border: none;
    outline: none;
    background: #111;
    color: #00ffcc;
    border: 1px solid #00ffcc;
}

button {
    padding: 10px 20px;
    background: #00ffcc;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: black;
    color: #00ffcc;
    border: 1px solid #00ffcc;
}

img {
    margin-top: 20px;
    max-width: 90%;
    border: 2px solid #00ffcc;
    display: none;
}

.loader {
    display: none;
    margin-top: 20px;
}
</style>

</head>

<body>

<h1>⚡ MIRAJ HACKZ AI 🤖</h1>

<input type="text" id="prompt" placeholder="Enter your image prompt...">
<br>
<button onclick="generateImage()">Generate Image</button>

<div class="loader" id="loader">⚡ Generating...</div>

<br>
<img id="result">

<br>
<a id="downloadBtn" style="display:none;" download="miraj-ai.png">
    <button>Download Image</button>
</a>

<script>
async function generateImage() {
    const prompt = document.getElementById("prompt").value;
    const img = document.getElementById("result");
    const loader = document.getElementById("loader");
    const downloadBtn = document.getElementById("downloadBtn");

    if (!prompt) {
        alert("Enter prompt first!");
        return;
    }

    loader.style.display = "block";
    img.style.display = "none";
    downloadBtn.style.display = "none";

    try {
        const response = await fetch(
            "https://api-inference.huggingface.co/models/stabilityai/stable-diffusion-2",
            {
                method: "POST",
                headers: {
                    "Authorization": "Bearer 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",
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ inputs: prompt })
            }
        );

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);

        img.src = url;
        img.style.display = "block";

        downloadBtn.href = url;
        downloadBtn.style.display = "inline";

    } catch (err) {
        alert("Error generating image!");
    }

    loader.style.display = "none";
}
</script>

</body>
</html>
